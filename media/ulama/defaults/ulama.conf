# Minimal ULAMA daemon config for LuckFox CRSF forwarding smoke.
# CLI flags override these values.

transport=unow
iface=mon0
node=1
uart=/dev/ttyS3
baud=420000
verbose=false

# For host-only UDP validation, override these:
# transport=udp
# listen=127.0.0.1:5000
# output=/tmp/ulama-crsf.bin
# count=1
# ready_file=/tmp/ulama.ready